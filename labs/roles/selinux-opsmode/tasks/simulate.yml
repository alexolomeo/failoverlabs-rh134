---

#- name: SIMULATE LAB - Reiniciar el sistema para velidar  SELINUX
#  ansible.builtin.reboot:
#    reboot_timeout: 600
#    test_command:  "getenforce"

- name: "SIMULATE LAB - Crear directory validator: {{ failover_remote_validator_temp }}"
  become: yes
  ansible.builtin.file:
    path: "{{ failover_remote_validator_temp }}"
    state: directory
    mode: 0755

- name: "SIMULATE LAB - Crear file validator: {{ failover_remote_validator_temp }}/simulate.log temporal"
  become: yes
  ansible.builtin.file:
    path: "{{ failover_remote_validator_temp }}/simulate.log"
    state: touch
    mode: 0644

- name: SIMULATE LAB - Leer el archivo /etc/selinux/config para verificar SELINUX=enforcing
  ansible.builtin.slurp:
    src: /etc/selinux/config
  register: config_file

- name: SIMULATE LAB - Log de éxito (SELINUX=enforcing encontrado)
  become: yes
  ansible.builtin.shell: 
    cmd: "echo '1:selinux:success:Enforcing' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: config_file.content | b64decode | regex_search('SELINUX=enforcing')
  changed_when: true

- name: SIMULATE LAB - Log de error (SELINUX=enforcing NO encontrado)
  become: yes
  ansible.builtin.shell: 
    cmd: "echo '1:selinux:failed:Enforcing' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: not (config_file.content | b64decode | regex_search('SELINUX=enforcing'))
  changed_when: true


- name: SIMULATE LAB - Verificar que getenforce devuelva "Enforcing"
  become: yes
  ansible.builtin.command:
    cmd: getenforce
  register: getenforce_output
  changed_when: false

- name: SIMULATE LAB - Validar que la salida de getenforce sea "Enforcing"
  become: yes
  ansible.builtin.shell:
    cmd: "echo '2:getenforce:success:Enforcing' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: getenforce_output.stdout == "Enforcing" 

- name: SIMULATE LAB - Validar que la salida de getenforce sea distinto "Enforcing"
  become: yes
  ansible.builtin.shell:
    cmd: "echo '2:getenforce:failed:Enforcing' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: getenforce_output.stdout != "Enforcing" 


- name: SIMULATE LAB - Obtener historial de comandos
  ansible.builtin.shell: |
    history -a  # Fuerza la escritura de la sesión actual al archivo
    cat /root/.bash_history
  register: history_output

- name: SIMULATE LAB - Escribir historial en archivo log
  become: yes
  ansible.builtin.copy:
    content: "{{ history_output.stdout }}"
    dest: "{{ failover_remote_validator_temp }}/history.log"
    mode: '0644'

- name: SIMULATE LAB - Validar si getenforce aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '3:history:success:getenforce' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: history_output.stdout | regex_search('^getenforce', multiline=True)

- name: SIMULATE LAB - Validar si getenforce no aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '3:history:failed:getenforce' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: not(history_output.stdout | regex_search('^getenforce', multiline=True))


- name: SIMULATE LAB - Validar si setenforce 1 aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '4:history:success:setenforce 1' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: history_output.stdout | regex_search('^setenforce 1', multiline=True)

- name: SIMULATE LAB - Validar si setenforce 1 no aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '4:history:failed:setenforce 1' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: not(history_output.stdout | regex_search('^setenforce 1', multiline=True))


- name: SIMULATE LAB - Validar si setenforce 0 aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '5:history:success:setenforce 0' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: history_output.stdout | regex_search('^setenforce 0', multiline=True)

- name: SIMULATE LAB - Validar si setenforce 0 no aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '5:history:failed:setenforce 0' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: not (history_output.stdout | regex_search('^setenforce 0', multiline=True))


- name: SIMULATE LAB - Validar si systecmctl reboot aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '6:history:success:systemctl reboot' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: history_output.stdout | regex_search('^systemctl reboot', multiline=True)

- name: SIMULATE LAB - Validar si systecmctl reboot no aparece correctamente en el historial
  become: yes
  ansible.builtin.shell:
    cmd: "echo '6:history:failed:systecmctl reboot' >> {{ failover_remote_validator_temp }}/simulate.log"
  when: not (history_output.stdout | regex_search('^systemctl reboot', multiline=True))


