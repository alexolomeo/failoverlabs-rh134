---

- name: scheduling review
  hosts: workstation
  gather_facts: no
  become: true
  vars: 
    failover_mode: "start"
  roles:
    - role: scheduling-review
      failover_project: scheduling-review               # lab <failover_mode> <failover_project>
      failover_environment: "workstation"               # workstation, servera serverb 
      failover_user: root 
      failover_group: root


- name: scheduling review
  hosts: servera
  gather_facts: no
  become: true
  vars: 
    failover_mode: "start"
  roles:
    - role: scheduling-review
      failover_remote_project: scheduling-review
      failover_remote_environment: "servera"              # workstation, servera serverb 
      failover_remote_user: root
      failover_remote_group: root
      validator_history:
        - { id: 1, label: "set at", regex: '^ *[0-9]\+  echo .*date >> /home/student/myjob.txt.* | at now \+[0-9]min' , weight: 10}
        - { id: 2, label: "atq", regex: "^atq" , weight: 10}
        - { id: 3, label: "waching scheduling", regex: "^watch atq" , weight: 10}
        - { id: 4, label: "Show files target", regex: "^cat myjob.txt" , weight: 10}
        - { id: 5, label: "Show tea", regex: "^at -q g teatime" , weight: 10}
        - { id: 6, label: "Show cookies time", regex: "^at -q b 16:05" , weight: 10}
        - { id: 7, label: "Show command tea", regex: "^at -c 2" , weight: 10}
        - { id: 8, label: "Show command cookies", regex: "^at -c 3" , weight: 10}
        - { id: 9, label: "Remove scheduling tea", regex: "^atrm 2" , weight: 10}
      validator_at:
        - { id: "10", label: "Get comand AT" , regex: "g student" ,weight: 20}
        - { id: "11", label: "Get comand AT" , regex: "^(?!b student$).*" ,weight: 20}
      validator_file:
        - { id: "12", label: "Check File" , regex: "/home/student/myjob.txt" ,weight: 5}
        - { id: "13", label: "Check File" , regex: "/home/student/cookies.txt" ,weight: 5}


        
